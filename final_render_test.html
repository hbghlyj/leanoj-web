<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
</head>
<body>
    <div id="test-content" class="markdown">Consider $\frac{n}{2}$ and  + b_j$.</div>
    <div id="result"></div>
    <script>
        marked.use(markedKatex({ throwOnError: false, displayMode: false, nonStandard: true }));
        const el = document.getElementById('test-content');
        const raw = el.textContent.trim();
        const output = marked.parse(raw);
        document.getElementById('result').innerHTML = output;
        console.log('RAW SOURCE:', raw);
    </script>
</body>
</html>
